<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#12304a">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/static/favicons/favicon.ico" sizes="any">
  <link rel="icon" href="/static/favicons/favicon.svg" type="image/svg+xml">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/favicons/apple-touch-icon.png">
  <link rel="mask-icon" href="/static/favicons/safari-pinned-tab.svg" color="#2f80ed">
  <title>PiBells Login</title>
  <link rel="stylesheet" href="/static/css/all.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <img src="/static/logo.svg" alt="PiBells logo" class="auth-logo">
      <h1>Sign in to PiBells</h1>
      <form id="login-form" method="post" action="/login" class="stack-form">
        <label>
          <span>Username</span>
          <input type="text" name="username" autocomplete="username" required autofocus>
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <label class="check-row">
          <input type="checkbox" name="remember">
          <span>Remember me</span>
        </label>
        <button type="submit" class="btn full-width"><i class="fa-solid fa-right-to-bracket" aria-hidden="true"></i><span>Login</span></button>
      </form>
      <div id="error-msg" class="form-error" role="alert"></div>
    </section>
  </main>
  <footer class="app-footer auth-footer">
    <div class="footer-brand">
      <img src="/static/logo.svg" alt="">
      <span>PiBells</span>
    </div>
    <div id="hostname"></div>
  </footer>
  <div id="toast-region" class="toast-region" aria-live="polite"></div>
  <script type="module" src="/static/login.js"></script>
</body>
</html>
