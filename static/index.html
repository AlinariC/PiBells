<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#12304a">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/static/favicons/favicon.ico" sizes="any">
  <link rel="icon" href="/static/favicons/favicon.svg" type="image/svg+xml">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/favicons/apple-touch-icon.png">
  <link rel="mask-icon" href="/static/favicons/safari-pinned-tab.svg" color="#2f80ed">
  <title>PiBells Schedule</title>
  <link rel="stylesheet" href="/static/css/all.min.css">
  <link rel="stylesheet" href="/static/style.css?asset=schedule-modal">
</head>
<body data-page="schedule">
  <header class="app-header">
    <a href="/" class="brand" aria-label="PiBells home">
      <img src="/static/logo.svg" alt="PiBells logo">
      <span>PiBells</span>
    </a>
    <div id="current-time" class="clock"></div>
    <button id="menu-toggle" class="icon-btn nav-toggle" type="button" title="Menu" aria-expanded="false">
      <i class="fa-solid fa-bars" aria-hidden="true"></i>
    </button>
    <nav class="app-nav" aria-label="Primary">
      <a href="/" data-nav="schedule"><i class="fa-solid fa-calendar-days" aria-hidden="true"></i><span>Schedule</span></a>
      <a href="/buttons" data-nav="buttons"><i class="fa-solid fa-bell" aria-hidden="true"></i><span>Buttons</span></a>
      <a href="/admin" data-nav="admin"><i class="fa-solid fa-gear" aria-hidden="true"></i><span>Settings</span></a>
    </nav>
    <div class="header-actions">
      <div class="theme-switch" aria-label="Theme">
        <button class="theme-btn" data-theme="light" type="button" title="Light"><i class="fa-solid fa-sun" aria-hidden="true"></i></button>
        <button class="theme-btn" data-theme="auto" type="button" title="Auto"><i class="fa-solid fa-circle-half-stroke" aria-hidden="true"></i></button>
        <button class="theme-btn" data-theme="dark" type="button" title="Dark"><i class="fa-solid fa-moon" aria-hidden="true"></i></button>
      </div>
      <a class="icon-btn" href="/logout" title="Logout"><i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i></a>
    </div>
  </header>

  <main class="app-main">
    <section class="page-heading">
      <div>
        <p class="eyebrow">Active schedule: <span id="active-schedule-name">Default</span></p>
        <h1>Schedule Console</h1>
      </div>
      <div class="page-actions schedule-tools">
        <select id="schedule-select" aria-label="Schedule"></select>
        <button id="set-schedule" class="btn secondary" type="button"><i class="fa-solid fa-check" aria-hidden="true"></i><span>Activate</span></button>
        <input id="new-schedule" type="text" placeholder="New schedule" autocomplete="off">
        <button id="add-schedule" class="btn" type="button"><i class="fa-solid fa-plus" aria-hidden="true"></i><span>Add</span></button>
        <button id="delete-schedule" class="icon-btn danger" type="button" title="Delete schedule"><i class="fa-solid fa-trash" aria-hidden="true"></i></button>
      </div>
    </section>

    <section id="dashboard-metrics" class="metrics" aria-label="Schedule summary"></section>

    <section class="section-band">
      <div class="section-heading">
        <h2>Quick Play</h2>
        <a class="text-link" href="/buttons">Manage</a>
      </div>
      <div id="quick-buttons" class="quick-grid"></div>
    </section>

    <section class="workspace-grid schedule-layout">
      <section class="panel schedule-panel">
        <div class="panel-heading">
          <h2>Week</h2>
        </div>
        <div id="schedule-board" class="schedule-board"></div>
      </section>
    </section>
  </main>

  <footer class="app-footer">
    <div class="footer-brand">
      <img src="/static/logo.svg" alt="">
      <span>PiBells</span>
    </div>
    <div id="hostname"></div>
  </footer>

  <dialog id="entry-dialog" class="modal-dialog">
    <section class="modal-panel">
      <div class="modal-heading">
        <div>
          <p class="eyebrow">Schedule entry</p>
          <h2 id="entry-form-title">Add Bell</h2>
        </div>
        <button id="entry-close" class="icon-btn" type="button" title="Close"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
      </div>
      <form id="entry-form" class="control-panel">
        <div class="panel-heading">
          <h2>Bell Details</h2>
        </div>
        <label>
          <span>Day</span>
          <select id="entry-day" required></select>
        </label>
        <label>
          <span>Time</span>
          <input id="entry-time" type="time" required>
        </label>
        <label>
          <span>Sound</span>
          <select id="entry-sound" required></select>
        </label>
        <label>
          <span>Label</span>
          <input id="entry-label" type="text" placeholder="Passing bell" autocomplete="off">
        </label>
        <label class="check-row">
          <input id="entry-enabled" type="checkbox" checked>
          <span>Enabled</span>
        </label>
        <div class="button-row">
          <button id="entry-submit" class="btn" type="submit"><i class="fa-solid fa-plus" aria-hidden="true"></i><span>Add Bell</span></button>
          <button id="entry-cancel" class="btn secondary" type="button">Cancel</button>
        </div>
      </form>
    </section>
  </dialog>
  <div id="toast-region" class="toast-region" aria-live="polite"></div>
  <script type="module" src="/static/schedule.js?asset=schedule-modal"></script>
</body>
</html>
